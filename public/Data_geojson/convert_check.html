/* UTM Zone 49S (EPSG:32749) to WGS84 */
function utmToWgs84(E, N) {
  const a  = 6378137.0;
  const f  = 1/298.257223563;
  const k0 = 0.9996;
  const E0 = 500000.0;
  const N0 = 10000000.0;  // southern hemisphere
  const lon0 = (111.0 * Math.PI) / 180;  // zone 49 central meridian

  const b  = a * (1 - f);
  const e2 = 2*f - f**2;
  const e  = Math.sqrt(e2);

  const Nval = N - N0;
  const M    = Nval / k0;
  const mu   = M / (a * (1 - e2/4 - 3*e2**2/64 - 5*e2**3/256));

  const e1   = (1 - Math.sqrt(1-e2)) / (1 + Math.sqrt(1-e2));
  const phi1 = mu
    + (3*e1/2 - 27*e1**3/32)*Math.sin(2*mu)
    + (21*e1**2/16 - 55*e1**4/32)*Math.sin(4*mu)
    + (151*e1**3/96)*Math.sin(6*mu)
    + (1097*e1**4/512)*Math.sin(8*mu);

  const sp = Math.sin(phi1), cp = Math.cos(phi1), tp = sp/cp;
  const N1 = a / Math.sqrt(1 - e2*sp**2);
  const T1 = tp**2;
  const C1 = e2/(1-e2) * cp**2;
  const R1 = a*(1-e2) / (1-e2*sp**2)**1.5;
  const D  = (E - E0) / (N1*k0);

  const lat = phi1
    - (N1*tp/R1)*(D**2/2
      - (5 + 3*T1 + 10*C1 - 4*C1**2 - 9*(e2/(1-e2)))*D**4/24
      + (61 + 90*T1 + 298*C1 + 45*T1**2 - 252*(e2/(1-e2)) - 3*C1**2)*D**6/720);
  const lng = lon0 + (D
    - (1 + 2*T1 + C1)*D**3/6
    + (5 - 2*C1 + 28*T1 - 3*C1**2 + 8*(e2/(1-e2)) + 24*T1**2)*D**5/120) / cp;

  return [lat * 180/Math.PI, lng * 180/Math.PI];
}

function convertCoord(c) {
  const [lat, lng] = utmToWgs84(c[0], c[1]);
  return [parseFloat(lng.toFixed(8)), parseFloat(lat.toFixed(8))];
}

function convertGeom(g) {
  if (!g) return g;
  const t = g.type;
  if (t === 'Point') g.coordinates = convertCoord(g.coordinates);
  else if (t === 'MultiPoint' || t === 'LineString') g.coordinates = g.coordinates.map(convertCoord);
  else if (t === 'MultiLineString' || t === 'Polygon') g.coordinates = g.coordinates.map(r => r.map(convertCoord));
  else if (t === 'MultiPolygon') g.coordinates = g.coordinates.map(p => p.map(r => r.map(convertCoord)));
  return g;
}
